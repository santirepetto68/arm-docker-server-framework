services:
  ark-install:
    image: ${INSTALL_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME:-arksearm}_install
    restart: "no"
    env_file:
      - .env
    environment:
      - TZ=${TZ:-UTC}
      - GAME_ID=${GAME_ID:-ark-se}
    working_dir: /mnt/server
    entrypoint: ["/bin/bash", "/project/scripts/install-game.sh"]
    volumes:
      - ./data/server:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/ark-se:/project/game:ro
      - ./config:/project/config:ro

  ark:
    image: ${RUNTIME_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME:-arksearm}_server
    depends_on:
      ark-install:
        condition: service_completed_successfully
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ:-UTC}
      - GAME_ID=${GAME_ID:-ark-se}
    working_dir: /mnt/server
    init: true
    stop_grace_period: 5m
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}/udp"
      - "${RAW_SOCKET_PORT}:${RAW_SOCKET_PORT}/udp"
      - "${QUERY_PORT}:${QUERY_PORT}/udp"
      - "${RCON_PORT}:${RCON_PORT}/tcp"
    volumes:
      - ./data/server:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/ark-se:/project/game:ro
      - ./config:/project/config:ro
      - ./backups:/backups
    entrypoint: ["/bin/bash", "/project/scripts/start-game.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/bin/bash /project/game/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 8m
