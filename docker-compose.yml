services:
  # ---------------------------------------------------------------------------
  # Base service definitions (not used directly — extended by per-game services)
  # ---------------------------------------------------------------------------
  install:
    image: ${INSTALL_IMAGE}
    restart: "no"
    environment:
      - TZ=${TZ:-UTC}
    working_dir: /mnt/server
    entrypoint: ["/bin/bash", "/project/scripts/install-game.sh"]

  server:
    image: ${RUNTIME_IMAGE}
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    working_dir: /mnt/server
    init: true
    stop_grace_period: 5m
    ports: !reset []
    entrypoint: ["/bin/bash", "/project/scripts/start-game.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/bin/bash /project/game/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 8m

  # ---------------------------------------------------------------------------
  # ARK: Survival Evolved
  # ---------------------------------------------------------------------------
  ark-install:
    extends:
      service: install
    container_name: ${COMPOSE_PROJECT_NAME:-gameserver}_ark-se_install
    env_file:
      - .env
      - path: instances/ark-se.env
        required: false
    environment:
      - GAME_ID=ark-se
    volumes:
      - ./data/ark-se:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/ark-se:/project/game:ro

  ark-se:
    extends:
      service: server
    container_name: ${COMPOSE_PROJECT_NAME:-gameserver}_ark-se_server
    depends_on:
      ark-install:
        condition: service_completed_successfully
    env_file:
      - .env
      - path: instances/ark-se.env
        required: false
    environment:
      - GAME_ID=ark-se
    ports:
      - "${SERVER_PORT:-7777}:${SERVER_PORT:-7777}/udp"
      - "${RAW_SOCKET_PORT:-7778}:${RAW_SOCKET_PORT:-7778}/udp"
      - "${QUERY_PORT:-27015}:${QUERY_PORT:-27015}/udp"
      - "${RCON_PORT:-27020}:${RCON_PORT:-27020}/tcp"
    volumes:
      - ./data/ark-se:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/ark-se:/project/game:ro
      - ./backups:/backups

  # ---------------------------------------------------------------------------
  # Project Zomboid
  # ---------------------------------------------------------------------------
  project-zomboid-install:
    extends:
      service: install
    container_name: ${COMPOSE_PROJECT_NAME:-gameserver}_project-zomboid_install
    env_file:
      - .env
      - path: instances/project-zomboid.env
        required: false
    environment:
      - GAME_ID=project-zomboid
    volumes:
      - ./data/project-zomboid:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/project-zomboid:/project/game:ro

  project-zomboid:
    extends:
      service: server
    # Override the runtime image: PZ needs FEX-Emu (box64 crashes PZ's JIT).
    # The FEX image ships its own rootfs at /usr/local/FEX/.
    image: ${PZ_RUNTIME_IMAGE:-quintenqvd/pterodactyl_images:dev_fex_latest}
    container_name: ${COMPOSE_PROJECT_NAME:-gameserver}_project-zomboid_server
    depends_on:
      project-zomboid-install:
        condition: service_completed_successfully
    env_file:
      - .env
      - path: instances/project-zomboid.env
        required: false
    environment:
      - GAME_ID=project-zomboid
      # FEX_KERNELVERSION works around the "FATAL: kernel too old" glibc abort
      # from the rootfs's glibc when FEX reports too low an OS ABI version.
      # Override via instances/project-zomboid.env if needed.
      - FEX_KERNELVERSION=${FEX_KERNELVERSION:-6.1}
      # FEX rootfs is bootstrapped by games/project-zomboid/game.sh into
      # /mnt/server/.fex/ (~2GB, downloaded on first run). Persists inside
      # the PZ data volume across container recreates.
    ports:
      - "${PZ_SERVER_PORT:-16261}:${PZ_SERVER_PORT:-16261}/udp"
      - "${PZ_SERVER_PORT:-16261}:${PZ_SERVER_PORT:-16261}/tcp"
      - "${PZ_STEAM_PORT:-16262}:${PZ_STEAM_PORT:-16262}/udp"
    volumes:
      - ./data/project-zomboid:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/project-zomboid:/project/game:ro
      - ./backups:/backups
