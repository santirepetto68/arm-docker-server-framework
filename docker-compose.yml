services:
  # ---------------------------------------------------------------------------
  # Base service definitions (not used directly — extended by per-game services)
  # ---------------------------------------------------------------------------
  install:
    image: ${INSTALL_IMAGE}
    restart: "no"
    environment:
      - TZ=${TZ:-UTC}
    working_dir: /mnt/server
    entrypoint: ["/bin/bash", "/project/scripts/install-game.sh"]

  server:
    image: ${RUNTIME_IMAGE}
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    working_dir: /mnt/server
    init: true
    stop_grace_period: 5m
    ports: !reset []
    entrypoint: ["/bin/bash", "/project/scripts/start-game.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/bin/bash /project/game/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 8m

  # ---------------------------------------------------------------------------
  # ARK: Survival Evolved
  # ---------------------------------------------------------------------------
  ark-install:
    extends:
      service: install
    container_name: ${COMPOSE_PROJECT_NAME:-gameserver}_ark-se_install
    env_file:
      - .env
      - path: instances/ark-se.env
        required: false
    environment:
      - GAME_ID=ark-se
    volumes:
      - ./data/ark-se:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/ark-se:/project/game:ro

  ark-se:
    extends:
      service: server
    container_name: ${COMPOSE_PROJECT_NAME:-gameserver}_ark-se_server
    depends_on:
      ark-install:
        condition: service_completed_successfully
    env_file:
      - .env
      - path: instances/ark-se.env
        required: false
    environment:
      - GAME_ID=ark-se
    ports:
      - "${SERVER_PORT:-7777}:${SERVER_PORT:-7777}/udp"
      - "${RAW_SOCKET_PORT:-7778}:${RAW_SOCKET_PORT:-7778}/udp"
      - "${QUERY_PORT:-27015}:${QUERY_PORT:-27015}/udp"
      - "${RCON_PORT:-27020}:${RCON_PORT:-27020}/tcp"
    volumes:
      - ./data/ark-se:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/ark-se:/project/game:ro
      - ./backups:/backups

  # ---------------------------------------------------------------------------
  # Project Zomboid
  # ---------------------------------------------------------------------------
  project-zomboid-install:
    extends:
      service: install
    container_name: ${COMPOSE_PROJECT_NAME:-gameserver}_project-zomboid_install
    env_file:
      - .env
      - path: instances/project-zomboid.env
        required: false
    environment:
      - GAME_ID=project-zomboid
    volumes:
      - ./data/project-zomboid:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/project-zomboid:/project/game:ro

  project-zomboid:
    extends:
      service: server
    # Override the runtime image: PZ needs FEX-Emu (box64 crashes PZ's JIT).
    # supersunho/fex-emu ships an x86_64 rootfs at /opt/fex-rootfs which game.sh
    # prefers. If you swap to an image without a bundled rootfs, set
    # FEX_ROOTFS_PATH or let game.sh download one (needs curl + python3 +
    # unsquashfs in the image).
    image: ${PZ_RUNTIME_IMAGE:-supersunho/fex-emu:ubuntu-24.04}
    container_name: ${COMPOSE_PROJECT_NAME:-gameserver}_project-zomboid_server
    depends_on:
      project-zomboid-install:
        condition: service_completed_successfully
    env_file:
      - .env
      - path: instances/project-zomboid.env
        required: false
    environment:
      - GAME_ID=project-zomboid
      # FEX rootfs resolution order (see games/project-zomboid/game.sh):
      #   1. FEX_ROOTFS_PATH if set to a real dir
      #   2. image-bundled /opt/fex-rootfs (pz-fex-arm64 ships Ubuntu 22.04 here)
      #   3. on-demand download to /mnt/server/.fex/RootFS/<distro>
      # FEX_ROOTFS_DISTRO only applies to path 3.
      - FEX_ROOTFS_DISTRO=${FEX_ROOTFS_DISTRO:-Ubuntu 22.04}
      - FEX_ROOTFS_PATH=${FEX_ROOTFS_PATH:-}
      # AOT cache: generate translations on first run, reuse on subsequent runs.
      # Without these PZ does a cold translation pass every boot, which on this
      # FEX build can wedge during script-loading C2 compilation. The cache is
      # bind-mounted below so it persists across container recreations.
      - FEX_AOTIRCAPTURE=1
      - FEX_AOTIRGENERATE=1
      - FEX_AOTIRLOAD=1
    ports:
      - "${PZ_SERVER_PORT:-16261}:${PZ_SERVER_PORT:-16261}/udp"
      - "${PZ_SERVER_PORT:-16261}:${PZ_SERVER_PORT:-16261}/tcp"
      - "${PZ_STEAM_PORT:-16262}:${PZ_STEAM_PORT:-16262}/udp"
    # FEX 2604 (Apr 2026) release notes call out a Docker seccomp filter bug
    # that caused "really bizarre issues" and crashes when FEX runs under the
    # default Docker seccomp profile. supersunho/fex-emu:ubuntu-24.04 ships
    # FEX 2601 which predates the fix, so we relax seccomp here. Safe for a
    # single-purpose game-server container; revisit if we upgrade to a FEX
    # build that includes the fix.
    security_opt:
      - seccomp=unconfined
    volumes:
      - ./data/project-zomboid:/mnt/server
      - ./scripts:/project/scripts:ro
      - ./games/project-zomboid:/project/game:ro
      - ./backups:/backups
      # FEX AOT translation cache. Persisting it across container recreations
      # is what turns cold-start hangs into one-shot stable boots.
      - ./data/project-zomboid/.fex-cache:/home/steam/.fex-emu/AOTIRCache
