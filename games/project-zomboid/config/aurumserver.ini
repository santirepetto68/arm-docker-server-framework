# Project Zomboid server config — synced to .cache/Zomboid/Server/ on every start.
# File name must match SERVER_NAME (default: servertest).
# If you change SERVER_NAME, rename this file to match and update GAME_CONFIG_FILES in game.env.
#
# Full option reference: https://pzwiki.net/wiki/Dedicated_server

Public=false
PublicName=Aurum Zomboid Server
PublicDescription=
MaxPlayers=10
PingFrequency=10
PingLimit=400

# Ports (kept in sync with SERVER_PORT / STEAM_PORT env vars via game.sh flags,
# but PZ also reads these from the ini on some code paths)
DefaultPort=16261
UDPPort=16262

# Passwords
Password=
AdminPassword=CHANGE_ME

# Map — must match the folder name under data/project-zomboid/media/maps/ exactly
# (including the ", KY" suffix). Stock maps: "Muldraugh, KY", "Riverside, KY",
# "Rosewood, KY", "West Point, KY". Multi-map: semicolon-separated, most-specific first.
Map=Rosewood, KY

# Saves/backups
SaveWorldEveryMinutes=20
BackupsCount=5
BackupsOnStart=false
BackupsOnVersionChange=true
BackupsPeriod=0

# PvP
PVP=true

# Mods (populate via MODS / MOD_WORKSHOP_IDS env vars in .env)
Mods=
WorkshopItems=

# Logging
PerkLogs=true
ClientCommandFilter=-vehicle.*
ClientActionLogs=ISEnterVehicle;ISExitVehicle;ISTakeEngineParts;

# AntiCheat
AntiCheatProtectionType1=true
AntiCheatProtectionType2=true
AntiCheatProtectionType3=false
AntiCheatProtectionType4=true
AntiCheatProtectionType5=true
AntiCheatProtectionType6=true
AntiCheatProtectionType7=true
AntiCheatProtectionType8=false
AntiCheatProtectionType9=true
AntiCheatProtectionType10=false
AntiCheatProtectionType11=false
AntiCheatProtectionType12=false
AntiCheatProtectionType13=false
AntiCheatProtectionType14=false
AntiCheatProtectionType15=false
AntiCheatProtectionType16=false
AntiCheatProtectionType17=false
AntiCheatProtectionType18=false
AntiCheatProtectionType19=false
AntiCheatProtectionType20=false

# Misc
Open=true
LogLocalChat=false
AutoCreateUserInWhiteList=false
DisplayUserName=true
ShowFirstAndLastName=false
SpawnPoint=0,0,0
SafetySystem=true
ShowSafety=true
SafetyToggleTimer=100
SafetyCooldownTimer=1000
SleepAllowed=false
SleepNeeded=false
KnockedDownAllowed=true
SneakModeHideFromOtherPlayers=true
SpawnItems=
GlobalChat=true
ChatStreams=s,r,a,w,y,sh,f,all
ServerPlayerID=0
RCONPort=27015
RCONPassword=
DoLuaChecksum=false
DenyLoginOnOverloadedServer=true
